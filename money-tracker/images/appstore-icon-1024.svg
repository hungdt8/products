<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667EEA"/>
      <stop offset="100%" stop-color="#764BA2"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
    <linearGradient id="coinShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.1)"/>
    </linearGradient>
    <filter id="coinShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <filter id="arrowGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="rgba(255,255,255,0.4)"/>
    </filter>
  </defs>

  <!-- Background with rounded corners (App Store standard ~22.37% radius) -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <!-- Subtle radial glow in center -->
  <circle cx="512" cy="460" r="360" fill="rgba(255,255,255,0.06)"/>

  <!-- Outer ring (subtle) -->
  <circle cx="512" cy="440" r="280" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="3"/>

  <!-- Coin circle with shadow -->
  <circle cx="512" cy="440" r="220" fill="rgba(255,255,255,0.1)" filter="url(#coinShadow)"/>

  <!-- Main coin -->
  <circle cx="512" cy="440" r="195" fill="url(#coinGrad)"/>

  <!-- Coin inner ring -->
  <circle cx="512" cy="440" r="170" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <circle cx="512" cy="440" r="155" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Coin shine overlay -->
  <circle cx="512" cy="440" r="195" fill="url(#coinShine)"/>

  <!-- Dollar sign -->
  <text x="512" y="470" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif" font-weight="800" font-size="230" fill="#764BA2" opacity="0.9">$</text>

  <!-- Dollar sign highlight -->
  <text x="510" y="468" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif" font-weight="800" font-size="230" fill="#6B3FA0" opacity="0.4">$</text>

  <!-- Upward arrow (growth/tracking) -->
  <g filter="url(#arrowGlow)">
    <path d="M400 760 L512 660 L624 760" fill="none" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="512" y1="660" x2="512" y2="850" stroke="white" stroke-width="32" stroke-linecap="round"/>
  </g>

  <!-- Small decorative dots -->
  <circle cx="280" cy="300" r="8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="744" cy="300" r="8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="320" cy="680" r="6" fill="rgba(255,255,255,0.15)"/>
  <circle cx="704" cy="680" r="6" fill="rgba(255,255,255,0.15)"/>
</svg>
